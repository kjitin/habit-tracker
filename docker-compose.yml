services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: habits
      POSTGRES_PASSWORD: habits
      POSTGRES_DB: habits
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habits"]
      interval: 5s
      timeout: 3s
      retries: 5

  habit-service:
    build:
      context: .
      dockerfile: services/habit-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: default
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/habits
      SPRING_DATASOURCE_USERNAME: habits
      SPRING_DATASOURCE_PASSWORD: habits
      JWT_SECRET: this-is-a-fake-secret-of-at-least-32-chars-long
      JWT_ISSUER: habit-tracker-local
    ports:
      - "8080:8080"

volumes:
  pg-data:
