name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: openjdk  # change based on local java
          java-version: 22       # local version

      - uses: gradle/actions/setup-gradle@v3

      - name: Build and test
        run: ./gradlew build
